<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database Management System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>💼 Database Management System</h1>
            <div class="server-status" id="serverStatus">
                <span id="statusIndicator" class="status-dot"></span>
                <span id="statusText">Checking...</span>
                <span id="recordCount" class="record-count">Records: --</span>
            </div>
        </header>

        <!-- Navigation Tabs -->
        <nav class="nav-tabs">
            <button class="tab-btn active" data-tab="view">👁️ View</button>
            <button class="tab-btn" data-tab="add">➕ Add</button>
            <button class="tab-btn" data-tab="search">🔍 Search</button>
            <button class="tab-btn" data-tab="range">📊 Range Query</button>
        </nav>

        <!-- Main Content -->
        <main class="content">

            <!-- VIEW TAB -->
            <section class="tab-content active" id="view-tab">
                <h2>All People</h2>
                
                <div class="controls">
                    <button id="loadAllBtn" class="btn btn-primary">Load All</button>
                    <button id="refreshBtn" class="btn btn-secondary">Refresh</button>
                </div>

                <div class="table-wrapper">
                    <table class="data-table" id="peopleTable">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Age</th>
                                <th>Salary</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <tr class="empty-row">
                                <td colspan="5">Click "Load All" to fetch data...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- ADD TAB -->
            <section class="tab-content" id="add-tab">
                <h2>Add New Person</h2>
                
                <form class="form" id="addForm">
                    <div class="form-group">
                        <label for="addId">ID *</label>
                        <input type="number" id="addId" required placeholder="e.g., 100">
                    </div>

                    <div class="form-group">
                        <label for="addName">Name *</label>
                        <input type="text" id="addName" required placeholder="e.g., John Doe">
                    </div>

                    <div class="form-group">
                        <label for="addAge">Age *</label>
                        <input type="number" id="addAge" required min="1" max="150" placeholder="e.g., 30">
                    </div>

                    <div class="form-group">
                        <label for="addSalary">Salary *</label>
                        <input type="number" id="addSalary" required step="0.01" placeholder="e.g., 50000">
                    </div>

                    <button type="submit" class="btn btn-success">Add Person</button>
                </form>

                <div id="addMessage" class="message"></div>
            </section>

            <!-- SEARCH TAB -->
            <section class="tab-content" id="search-tab">
                <h2>Search by ID</h2>
                
                <div class="search-group">
                    <input type="number" id="searchId" placeholder="Enter Person ID..." class="input-large">
                    <button id="searchBtn" class="btn btn-primary">Search</button>
                </div>

                <div id="searchResult" class="search-result"></div>
                <div id="searchMessage" class="message"></div>
            </section>

            <!-- RANGE QUERY TAB -->
            <section class="tab-content" id="range-tab">
                <h2>Range Queries</h2>

                <div class="range-section">
                    <h3>Age Range Query</h3>
                    <div class="range-controls">
                        <input type="number" id="ageMin" placeholder="Min Age" min="1" max="150">
                        <span>to</span>
                        <input type="number" id="ageMax" placeholder="Max Age" min="1" max="150">
                        <button id="ageRangeBtn" class="btn btn-primary">Search</button>
                    </div>
                    <div id="ageRangeResult" class="range-result"></div>
                </div>

                <hr style="margin: 30px 0; opacity: 0.3;">

                <div class="range-section">
                    <h3>Salary Range Query</h3>
                    <div class="range-controls">
                        <input type="number" id="salaryMin" placeholder="Min Salary" step="0.01">
                        <span>to</span>
                        <input type="number" id="salaryMax" placeholder="Max Salary" step="0.01">
                        <button id="salaryRangeBtn" class="btn btn-primary">Search</button>
                    </div>
                    <div id="salaryRangeResult" class="range-result"></div>
                </div>
            </section>

        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>🔗 Endpoint: <code>http://127.0.0.1:8080</code> | Version 1.0</p>
        </footer>
    </div>

    <!-- Modals -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Edit Person</h2>
            <form id="editForm" class="form">
                <input type="hidden" id="editId">
                <div class="form-group">
                    <label for="editName">Name</label>
                    <input type="text" id="editName" required>
                </div>
                <div class="form-group">
                    <label for="editAge">Age</label>
                    <input type="number" id="editAge" required min="1" max="150">
                </div>
                <div class="form-group">
                    <label for="editSalary">Salary</label>
                    <input type="number" id="editSalary" required step="0.01">
                </div>
                <button type="submit" class="btn btn-success">Save Changes</button>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
